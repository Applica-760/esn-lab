# 評価対象の訓練結果ディレクトリ (config.lock.yamlが存在する場所)
weight_dir: "outputs/experiments/renewd_v3"
output_dir: "outputs/experiments/eval_results"
data_source_base_dir: "dataset/10fold_npy"
folds: ["a", "b", "c", "d", "e", "f", "g", "h", "i", "j"]
workers: 10

# 評価モード: "test" (i番目のデータで評価), "train" (i番目以外で評価)
# リスト形式で複数指定可能
mode:
  - test
  # - train

Nu: 256
Ny: 3
