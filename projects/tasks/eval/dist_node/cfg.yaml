# 入力: 予測結果のディレクトリ
pred_result_dir: outputs/experiments/pred_results
judge_dir: outputs/eval/metrics
output_dir: outputs/eval/dist_node
sample_groups: [a, b, c, d, e, f, g, h, i, j]

# 対象モード (test / train)
mode:
  - test
  # - train

Nx: [7]
input_scale: [0.001]
density: [0.5]
rho: [0.9]

filters:  # フィルタ条件
  true_label: null  # 正解ラベル: null (フィルタなし), 0 (other), 1 (foraging), 2 (rumination)
  pred_label: null  # 予測ラベル: null (フィルタなし), 0, 1, 2
  is_correct: null  # 判定結果: null (フィルタなし), true (正解のみ), false (不正解のみ)
  groups: null  # グループ: null (全て), または配列 [a, b, c] など
  fold_indices: null  # fold: null (全て), または配列 [0, 1, 2] など

# ヒストグラム設定
bins: 50
show_count: true    # データ数をタイトルに表示
show_cumulative: true  # 累積分布を第2軸に表示

# プロットする指標の設定
# range: [min, max] で横軸の範囲を固定。null の場合は自動調整
metrics:
  confidence:
    enabled: true
    xlabel: "Confidence (Max Output Value)"
    range: [0, 1]  # 最大出力値の範囲
  margin:
    enabled: true
    xlabel: "Margin (1st - 2nd Output)"
    range: [0, 0.5]  # 1位と2位の差の範囲
  true_class_output:
    enabled: true
    xlabel: "True Class Output Value"
    range: [-0.2, 1]  # 正解クラス出力値の範囲
  node_output:
    enabled: true
    xlabel: "Node Output Value"
    range: [-0.2, 1]  # 各ノード出力値の範囲（3×3 一望プロット用）

# グラフの色設定 (カラーコード)
colors:
  all: "#4A90D9"
  correct: "#2ECC71"
  incorrect: "#E74C3C"
  foraging: "#2ECC71"
  rumination: "#E74C3C"
  other: "#9B59B6"

# 表示順に対応するJSONのインデックス
# class_names[0]=foraging はJSONの1, class_names[1]=rumination はJSONの2, class_names[2]=other はJSONの0
class_names: ["foraging", "rumination", "other"]
class_order: [1, 2, 0]
